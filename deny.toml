[advisories]
yanked = "deny"
ignore = [
    # Transitive build-time proc-macro dependency of age 0.11.3 via i18n-embed-fl.
    # The advisory is maintenance-status-only (no vulnerability), and age has no
    # upstream release that removes it yet. Revisit when age publishes an update.
    { id = "RUSTSEC-2026-0173", reason = "transitive build-only dependency; no safe upstream upgrade is available" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
