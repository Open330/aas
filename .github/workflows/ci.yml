name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Tests
        run: cargo test --workspace --all-targets --all-features --locked
      - name: Rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps --locked
      - name: Dependency policy
        run: |
          cargo install cargo-deny --version 0.19.9 --locked
          cargo deny check advisories bans licenses sources

  swift:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/aas-bar
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Unit tests
        run: swift test -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors
      - name: Strict concurrency build
        run: swift build -c release -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors
      - name: Assemble and verify portable app bundle
        shell: bash
        run: |
          set -euo pipefail
          ./build-app.sh
          mv .build .build-hidden
          trap 'mv .build-hidden .build' EXIT
          AAS_BAR_SNAPSHOT="$RUNNER_TEMP/aas-bar.png" AAS_BAR_SNAPSHOT_LARGE=1 ./AasBar.app/Contents/MacOS/AasBar
          test -s "$RUNNER_TEMP/aas-bar.png"
          codesign --verify --deep --strict --verbose=2 AasBar.app

  scripts:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Parse POSIX installers
        if: runner.os != 'Windows'
        run: sh -n install.sh apps/aas-bar/build-app.sh
      - name: Lint GitHub workflows
        if: runner.os != 'Windows'
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Parse PowerShell installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path ./install.ps1), [ref]$tokens, [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
