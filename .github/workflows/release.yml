name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  # Create the GitHub Release first so the parallel upload jobs never race to create it
  # (that race is what "release not found" was).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: ${{ matrix.target }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Builds `aas` for the target (auto-installs the toolchain + cross tooling for
      # musl / aarch64), packages it as aas-<target>.{tar.gz|zip}, and uploads it to the
      # GitHub Release for the pushed tag. No Node/runtime — a single static binary.
      - name: Build & upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: aas
          target: ${{ matrix.target }}
          archive: aas-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          # Keep the release profile from Cargo.toml (lto, strip, opt-level=z).
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
